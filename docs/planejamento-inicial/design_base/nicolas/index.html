<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Protótipo visual da hero dark premium da Home do YAHub."
    />
    <title>YAHub | Protótipo Hero</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="prototype-shell">
      <section class="hero" aria-labelledby="hero-title">
        <canvas class="hero-canvas" aria-hidden="true"></canvas>

        <div class="ambient ambient-a" aria-hidden="true"></div>
        <div class="ambient ambient-b" aria-hidden="true"></div>
        <div class="material-field" aria-hidden="true">
          <span class="material-slab slab-a"></span>
          <span class="material-slab slab-b"></span>
          <span class="material-slab slab-c"></span>
        </div>
        <div class="technical-grid" aria-hidden="true"></div>

        <header class="site-header" aria-label="Navegação principal">
          <nav class="main-nav" aria-label="Seções da Home">
            <a class="nav-link is-active" href="#home">home</a>
            <a class="nav-link" href="#about">about</a>
            <a class="nav-link" href="#ecosystem">ecosystem</a>
            <a class="nav-link" href="#products">products</a>
          </nav>

          <a class="portal-link" href="#portal">
            acessar portal
          </a>
        </header>

        <div class="hero-content" id="home">
          <h1 class="brand-lockup" id="hero-title">
            <span class="sr-only">YA LABS</span>
            <span class="ya-mark" aria-hidden="true">
              <span class="letter-y">Y</span>
              <span class="letter-a">
                <span class="a-leg a-leg-left"></span>
                <span class="a-leg a-leg-right"></span>
                <span class="a-cut"></span>
                <span class="a-star"></span>
              </span>
            </span>
            <span class="labs-word" aria-hidden="true">LABS</span>
          </h1>

          <p class="tagline" aria-label="Code. Automate. Scale.">
            <span>Code.</span>
            <span>Automate.</span>
            <span>Scale.</span>
          </p>
        </div>

        <a class="scroll-cue" href="#about" aria-label="Ir para a próxima seção">
          <span>scroll</span>
          <span aria-hidden="true">↓</span>
        </a>
      </section>

      <section class="next-section" id="about" aria-labelledby="about-title">
        <div class="section-inner">
          <p class="section-kicker">próxima dobra</p>
          <h2 id="about-title">Construímos como laboratório.</h2>
          <p>
            Esta área existe apenas para validar que a hero termina limpa na
            primeira dobra. A narrativa completa da Home deve ser prototipada
            em issues posteriores.
          </p>
        </div>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
