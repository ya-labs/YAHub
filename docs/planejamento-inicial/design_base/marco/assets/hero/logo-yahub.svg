<svg width="520" height="160" viewBox="0 0 520 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">YA Hub wordmark</title>
  <desc id="desc">Variao do wordmark para YA Hub com a mesma linguagem visual do mockup.</desc>
  <defs>
    <linearGradient id="starGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF8D9"/>
      <stop offset="0.38" stop-color="#E2B45E"/>
      <stop offset="1" stop-color="#9F6A20"/>
    </linearGradient>
    <filter id="starGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#BD8A35" flood-opacity="0.36"/>
    </filter>
  </defs>
  <text x="34" y="104" fill="#061A3C" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="86" font-weight="850" letter-spacing="-8">YA</text>
  <text x="177" y="104" fill="#BD8A35" font-family="'Playfair Display', Georgia, serif" font-size="86" font-weight="600" letter-spacing="-5">Hub</text>
  <path d="M151 76 L159 104 L187 112 L159 120 L151 148 L143 120 L115 112 L143 104 Z" fill="url(#starGold)" filter="url(#starGlow)"/>
</svg>
