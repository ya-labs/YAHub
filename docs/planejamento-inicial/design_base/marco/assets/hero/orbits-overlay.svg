<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linhas orbitais e partculas</title>
  <desc id="desc">Overlay transparente com rbitas douradas sutis e ns luminosos.</desc>
  <defs>
    <linearGradient id="orbitStroke" x1="520" y1="190" x2="1870" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BD8A35" stop-opacity="0"/>
      <stop offset="0.32" stop-color="#BD8A35" stop-opacity="0.24"/>
      <stop offset="0.72" stop-color="#BD8A35" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#BD8A35" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nodeGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(11)">
      <stop offset="0" stop-color="#FFF7DB"/>
      <stop offset="0.48" stop-color="#BD8A35"/>
      <stop offset="1" stop-color="#8B5B1D"/>
    </radialGradient>
    <filter id="nodeGlow" x="-120%" y="-120%" width="340%" height="340%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#E2B45E" flood-opacity="0.72"/>
    </filter>
  </defs>
  <g transform="rotate(-14 1240 520)" stroke="url(#orbitStroke)" stroke-width="1.4">
    <ellipse cx="1370" cy="398" rx="610" ry="165"/>
    <ellipse cx="1328" cy="520" rx="500" ry="102"/>
    <ellipse cx="1214" cy="672" rx="400" ry="104"/>
  </g>
  <g filter="url(#nodeGlow)">
    <circle cx="1498" cy="292" r="5.5" fill="url(#nodeGold)"/>
    <circle cx="1325" cy="640" r="5.5" fill="url(#nodeGold)"/>
    <circle cx="1766" cy="666" r="5.5" fill="url(#nodeGold)"/>
    <circle cx="768" cy="778" r="5.5" fill="url(#nodeGold)"/>
  </g>
</svg>
