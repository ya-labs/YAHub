<svg width="980" height="820" viewBox="0 0 980 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Smbolo YA em construo</title>
  <desc id="desc">Elemento principal do Design 02 com monograma YA, grid blueprint, andaimes e plataforma, sem estrela.</desc>
  <defs>
    <pattern id="blueprintGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#061A3C" stroke-opacity="0.13" stroke-width="1"/>
    </pattern>
    <linearGradient id="platform" x1="130" y1="706" x2="850" y2="706" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#061A3C" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="yaShadow" x="-20%" y="-20%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#061A3C" flood-opacity="0.25"/>
    </filter>
    <filter id="platformShadow" x="-20%" y="-120%" width="150%" height="320%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#061A3C" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="150" y="134" width="700" height="570" fill="url(#blueprintGrid)" opacity="0.78" stroke="#061A3C" stroke-opacity="0.18"/>
  <g stroke="#061A3C" stroke-linecap="round">
    <g opacity="0.62">
      <path d="M72 190 V682" stroke-width="2"/>
      <path d="M232 190 V682" stroke-width="2"/>
      <path d="M72 238 H232 M72 288 H232 M72 338 H232 M72 388 H232 M72 438 H232 M72 488 H232 M72 538 H232 M72 588 H232 M72 638 H232" stroke-opacity="0.28"/>
      <path d="M72 200 L232 310 M232 200 L72 310 M72 394 L232 504 M232 394 L72 504" stroke-opacity="0.18"/>
    </g>
    <g opacity="0.56" transform="skewY(-8)">
      <path d="M728 300 V770" stroke-width="2"/>
      <path d="M880 300 V770" stroke-width="2"/>
      <path d="M728 350 H880 M728 400 H880 M728 450 H880 M728 500 H880 M728 550 H880 M728 600 H880 M728 650 H880 M728 700 H880" stroke-opacity="0.28"/>
      <path d="M728 312 L880 422 M880 312 L728 422 M728 512 L880 622 M880 512 L728 622" stroke-opacity="0.18"/>
    </g>
  </g>
  <text x="170" y="640" fill="#061A3C" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="420" font-weight="900" letter-spacing="-74" filter="url(#yaShadow)">YA</text>
  <rect x="126" y="682" width="760" height="42" rx="21" fill="url(#platform)" filter="url(#platformShadow)"/>
</svg>
