<svg width="720" height="300" viewBox="0 0 720 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ASCII YA decorativo</title>
  <desc id="desc">Marca d'gua tipogrfica YA em estilo ASCII, com baixa opacidade e fundo transparente.</desc>
  <defs>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="0.35" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g fill="#061A3C" fill-opacity="0.21" font-family="'Space Mono', 'SFMono-Regular', Consolas, monospace" font-size="34" font-weight="700" letter-spacing="-1.3" filter="url(#subtleGlow)">
    <text x="24" y="60">YYYYYYY       AAAAA</text>
    <text x="24" y="96">  YYY        AAAAAAA</text>
    <text x="24" y="132">  YYY       AAA   AAA</text>
    <text x="24" y="168">  YYY      AAAAAAAAAAA</text>
    <text x="24" y="204">  YYY     AAA       AAA</text>
    <text x="24" y="240">  YYY    AAA         AAA</text>
  </g>
</svg>
