<svg width="430" height="76" viewBox="0 0 430 76" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Command bar clara</title>
  <desc id="desc">Barra de comando clara com prompt yalabs e ponto luminoso.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-80%" width="140%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#061A3C" flood-opacity="0.12"/>
    </filter>
    <filter id="dotGlow" x="-300%" y="-300%" width="700%" height="700%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#E2B45E" flood-opacity="0.9"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="428" height="74" rx="16" fill="#FFFAF4" fill-opacity="0.82" stroke="#061A3C" stroke-opacity="0.08" filter="url(#shadow)"/>
  <text x="24" y="45" fill="#BD8A35" font-family="'Space Mono', 'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="700">yalabs:~$</text>
  <text x="136" y="45" fill="#061A3C" font-family="'Space Mono', 'SFMono-Regular', Consolas, monospace" font-size="18">build the future</text>
  <circle cx="396" cy="38" r="4" fill="#BD8A35" filter="url(#dotGlow)"/>
</svg>
