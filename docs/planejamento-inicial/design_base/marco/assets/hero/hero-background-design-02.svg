<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Background base Design 02</title>
  <desc id="desc">Fundo claro com atmosfera de blueprint e glow dourado, sem monograma, estrela, nuvens ou estruturas.</desc>
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFAF3"/>
      <stop offset="0.5" stop-color="#F8F1E8"/>
      <stop offset="1" stop-color="#EFE6DB"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1690 160) rotate(90) scale(390)">
      <stop offset="0" stop-color="#E2B45E" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#E2B45E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1290 300) rotate(90) scale(430)">
      <stop offset="0" stop-color="#E2B45E" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#E2B45E" stop-opacity="0"/>
    </radialGradient>
    <pattern id="blueprintGrid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" stroke="#061A3C" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <linearGradient id="gridFade" x1="1920" y1="540" x2="360" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.78"/>
      <stop offset="0.45" stop-color="white" stop-opacity="0.32"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="gridMask">
      <rect width="1920" height="1080" fill="url(#gridFade)"/>
    </mask>
  </defs>
  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#goldGlow)"/>
  <rect width="1920" height="1080" fill="url(#ambientGold)"/>
  <rect width="1920" height="1080" fill="url(#blueprintGrid)" opacity="0.58" mask="url(#gridMask)"/>
</svg>
