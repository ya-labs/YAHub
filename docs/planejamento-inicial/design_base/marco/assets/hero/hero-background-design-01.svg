<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Background base Design 01</title>
  <desc id="desc">Fundo claro premium com gradientes, grid suave e iluminao difusa, sem logo, estrela ou monograma.</desc>
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFAF4"/>
      <stop offset="0.45" stop-color="#F5EEE6"/>
      <stop offset="1" stop-color="#EBE2D8"/>
    </linearGradient>
    <radialGradient id="leftLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(190 430) rotate(90) scale(440 520)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 180) rotate(90) scale(360)">
      <stop offset="0" stop-color="#E2B45E" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#E2B45E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(370 900) rotate(90) scale(330)">
      <stop offset="0" stop-color="#4A74AB" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#4A74AB" stop-opacity="0"/>
    </radialGradient>
    <pattern id="softGrid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" stroke="#061A3C" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <linearGradient id="gridFade" x1="960" y1="380" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0"/>
      <stop offset="0.48" stop-color="white" stop-opacity="0.42"/>
      <stop offset="1" stop-color="white" stop-opacity="0.76"/>
    </linearGradient>
    <mask id="gridMask">
      <rect width="1920" height="1080" fill="url(#gridFade)"/>
    </mask>
  </defs>
  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#leftLight)"/>
  <rect width="1920" height="1080" fill="url(#goldGlow)"/>
  <rect width="1920" height="1080" fill="url(#blueGlow)"/>
  <rect width="1920" height="1080" fill="url(#softGrid)" opacity="0.55" mask="url(#gridMask)"/>
  <path d="M-240 880 C260 775 680 810 1030 890 C1370 968 1640 940 2160 820 L2160 1080 L-240 1080 Z" fill="url(#bottomHaze)"/>
  <defs>
    <linearGradient id="bottomHaze" x1="805" y1="785" x2="913" y2="1126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#DFD4C7" stop-opacity="0.16"/>
    </linearGradient>
  </defs>
</svg>
