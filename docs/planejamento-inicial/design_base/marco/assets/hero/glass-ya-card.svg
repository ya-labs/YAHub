<svg width="980" height="820" viewBox="0 0 980 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Card de vidro com monograma YA</title>
  <desc id="desc">Elemento principal da direita do Design 01, isolado em fundo transparente e sem estrela.</desc>
  <defs>
    <linearGradient id="glassBack" x1="250" y1="58" x2="610" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.13"/>
    </linearGradient>
    <linearGradient id="glassFront" x1="355" y1="130" x2="840" y2="730" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="42" stdDeviation="36" flood-color="#061A3C" flood-opacity="0.12"/>
    </filter>
    <filter id="monogramGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="12" dy="14" stdDeviation="0" flood-color="#FFFFFF" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#FFFFFF" flood-opacity="0.74"/>
    </filter>
  </defs>
  <g transform="translate(104 34) rotate(-18 286 276) skewX(-8)" opacity="0.66" filter="url(#cardShadow)">
    <rect x="0" y="0" width="470" height="520" rx="30" fill="url(#glassBack)" stroke="#FFFFFF" stroke-opacity="0.68"/>
  </g>
  <g transform="translate(286 96) rotate(-12 304 300) skewX(-7)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="590" height="610" rx="34" fill="url(#glassFront)" stroke="#FFFFFF" stroke-opacity="0.68"/>
    <text x="290" y="392" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.13" stroke="#061A3C" stroke-opacity="0.1" stroke-width="2" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="330" font-weight="900" letter-spacing="-60" filter="url(#monogramGlow)">YA</text>
  </g>
</svg>
