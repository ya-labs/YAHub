<svg width="520" height="76" viewBox="0 0 520 76" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Command bar escura</title>
  <desc id="desc">Barra de comando escura com prompt yahub e ponto luminoso.</desc>
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="520" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061735"/>
      <stop offset="1" stop-color="#081F46"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-100%" width="140%" height="300%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#061A3C" flood-opacity="0.28"/>
    </filter>
    <filter id="dotGlow" x="-300%" y="-300%" width="700%" height="700%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#E2B45E" flood-opacity="0.9"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="518" height="74" fill="url(#bar)" stroke="#E2B45E" stroke-opacity="0.42" filter="url(#shadow)"/>
  <text x="24" y="45" fill="#BD8A35" font-family="'Space Mono', 'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="700">yahub:~$</text>
  <text x="128" y="45" fill="#DBE8FF" font-family="'Space Mono', 'SFMono-Regular', Consolas, monospace" font-size="18">build the future</text>
  <circle cx="486" cy="38" r="4" fill="#BD8A35" filter="url(#dotGlow)"/>
</svg>
